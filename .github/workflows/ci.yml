name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -e .

      - name: Run stdlib verification
        run: python scripts/verify_melon_stdlib.py

      - name: Run SDK verification
        run: python scripts/verify_sdk.py

      - name: Smoke test (stdlib chip)
        run: melon-lua samples/stdlib_smoke.lua --ticks 1
        continue-on-error: true

      - name: Smoke test (bignum chip)
        run: melon-lua samples/bignum.lua --ticks 5
        continue-on-error: true
